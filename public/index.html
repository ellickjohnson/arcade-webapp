<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NES Arcade - Play Classic Nintendo Games</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="crt-overlay"></div>
  
  <header class="header">
    <h1 class="title">🎮 NES ARCADE</h1>
    <p class="subtitle">Play Homebrew Nintendo Games</p>
  </header>

  <main class="main-content">
    <!-- Menu View -->
    <div id="menu-view">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 Search games...">
      </div>
      
      <div id="games-grid" class="games-grid">
        <div class="loading">Loading games from GitHub...</div>
      </div>
    </div>

    <!-- Player View -->
    <div id="player-view" class="hidden">
      <div class="player-header">
        <button id="back-btn" class="back-btn">← Back</button>
        <h2 id="game-title" class="game-title"></h2>
        <div class="player-controls">
          <button id="fullscreen-btn" title="Fullscreen">⛶</button>
          <button id="controls-btn" title="Controls">🎮</button>
        </div>
      </div>
      
      <div id="emulator-container" class="emulator-container">
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <div id="loading-overlay" class="loading-overlay">
          <div class="loading-text">Loading game...</div>
        </div>
      </div>
    </div>

    <!-- Controls Panel -->
    <div id="controls-panel" class="controls-panel hidden">
      <h3>NES Controls</h3>
      <div class="controls-grid">
        <div class="control-row"><span class="key">↑ ↓ ← →</span> <span class="action">D-Pad</span></div>
        <div class="control-row"><span class="key">Z</span> <span class="action">A Button</span></div>
        <div class="control-row"><span class="key">X</span> <span class="action">B Button</span></div>
        <div class="control-row"><span class="key">Enter</span> <span class="action">Start</span></div>
        <div class="control-row"><span class="key">Shift</span> <span class="action">Select</span></div>
      </div>
      <button id="close-controls" class="btn">Close</button>
    </div>
  </main>

  <!-- Toast Messages -->
  <div id="toast" class="toast hidden"></div>

  <footer class="footer">
    <p>Powered by jsnes emulator | Games from retrobrews/nes-games</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jsnes@1.2.1/dist/jsnes.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
